<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editor de Documento — MinhaMarca</title>
  <link rel="stylesheet" href="../CSS/Recursos.css">
  
</head>
<body>

  <!-- CABEÇALHO DO EDITOR -->
  <header class="editor-header">

   <div class="nav-logo">
        <a href="../index.html" class="btn-logo">
          <h1>a.asta.portfolio</h1>
        </a>
      </div>

    <!-- Nome do arquivo (editável) -->
    <div class="doc-name-wrap">
      <input
        type="text"
        id="doc-filename"
        value="Documento sem título"
        title="Clique para renomear"
        spellcheck="false"
      />
    </div>

    <!-- Ações -->
    <div class="header-actions">
      <div class="status-pill">
        <span class="status-dot" id="status-dot"></span>
        <span id="status-text">Salvo</span>
      </div>
      <button class="btn-header btn-export" onclick="exportarDoc()">
        ↓ Exportar
      </button>
      <button class="btn-header btn-save-doc" onclick="salvarDoc()">
        ✦ Salvar
      </button>
    </div>

  </header>

  <!-- ÁREA DO DOCUMENTO -->
  <main class="editor-page">
    <div class="paper">

      <!-- Título -->
      <textarea
        id="doc-title"
        rows="1"
        placeholder="Título do documento"
        spellcheck="true"
        oninput="autoResize(this); aoEditar()"
      ></textarea>

      <!-- Subtítulo -->
      <textarea
        id="doc-subtitle"
        rows="1"
        placeholder="Subtítulo ou descrição breve..."
        spellcheck="true"
        oninput="autoResize(this); aoEditar()"
      ></textarea>

      <!-- Linha decorativa -->
      <hr class="paper-divider">

      <!-- Meta -->
      <div class="doc-meta">
        <div class="doc-meta-left">
          <strong id="meta-filename">Documento sem título</strong>
          <span id="meta-date"></span>
        </div>
        <span id="meta-words">0 palavras</span>
      </div>

      <!-- Corpo do texto -->
      <textarea
        id="doc-body"
        rows="20"
        placeholder="Escreva o conteúdo aqui. Este espaço é todo seu..."
        spellcheck="true"
        oninput="autoResize(this); aoEditar()"
      ></textarea>

      <!-- Rodapé do papel -->
      <div class="paper-footer">
        <span id="count-chars">0 caracteres</span>
        <span id="count-time">Leitura: ~0 min</span>
      </div>

    </div>
  </main>

  <!-- TOAST -->
  <div class="toast" id="toast">
    <span class="toast-icon" id="toast-icon">✓</span>
    <span id="toast-msg">Salvo com sucesso!</span>
  </div>

 
  <script src="../JavaScript/Recursos.js"></script>

  

</body>
</html>
