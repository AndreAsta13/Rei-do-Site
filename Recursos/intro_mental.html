<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editor de Documento — MinhaMarca</title>
  <link rel="stylesheet" href="style.css">
  <style>

    /* ================================
       EDITOR — CABEÇALHO
    ================================ */
    .editor-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255, 255, 255, 0.97);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    /* Logo */
    .editor-header .logo {
      font-size: 1.45rem;
      font-weight: 800;
      text-decoration: none;
      color: var(--text);
      letter-spacing: -0.03em;
      flex-shrink: 0;
    }
    .editor-header .logo span { color: var(--primary); }

    /* Nome do arquivo no centro */
    .doc-name-wrap {
      flex: 1;
      display: flex;
      justify-content: center;
    }
    #doc-filename {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text-muted);
      background: transparent;
      border: none;
      outline: none;
      border-bottom: 1px dashed transparent;
      padding: 2px 6px;
      text-align: center;
      max-width: 260px;
      width: 100%;
      transition: border-color var(--trans);
    }
    #doc-filename:hover,
    #doc-filename:focus {
      border-bottom-color: var(--primary);
      color: var(--text);
    }

    /* Ações do cabeçalho */
    .header-actions {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-shrink: 0;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      color: var(--text-muted);
      padding: 4px 10px;
      border-radius: 50px;
      background: var(--surface-2);
      white-space: nowrap;
    }
    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #10b981;
      transition: background var(--trans);
    }
    .status-dot.editing { background: #f59e0b; }

    .btn-header {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 16px;
      border-radius: 50px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      text-decoration: none;
      white-space: nowrap;
      transition: all var(--trans);
    }
    .btn-export {
      background: transparent;
      color: var(--primary);
      border: 1.5px solid var(--primary);
    }
    .btn-export:hover {
      background: var(--primary);
      color: #fff;
      transform: translateY(-1px);
    }
    .btn-save-doc {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff;
      box-shadow: 0 4px 14px rgba(108, 99, 255, 0.3);
    }
    .btn-save-doc:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(108, 99, 255, 0.45);
    }

    /* ================================
       PÁGINA / PAPEL
    ================================ */
    .editor-page {
      background: #f0f0f7;
      min-height: calc(100vh - 60px);
      padding: 3rem 1rem 5rem;
    }

    .paper {
      background: #fff;
      max-width: 780px;
      margin: 0 auto;
      border-radius: 4px;
      box-shadow:
        0 2px 8px rgba(0,0,0,0.06),
        0 0 0 1px rgba(0,0,0,0.04);
      padding: 72px 88px;
      min-height: 900px;
    }

    /* Campo: Título */
    #doc-title {
      width: 100%;
      border: none;
      outline: none;
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 2.4rem;
      font-weight: 700;
      color: #111827;
      line-height: 1.2;
      margin-bottom: 0.75rem;
      background: transparent;
      resize: none;
      overflow: hidden;
    }
    #doc-title::placeholder { color: #d1d5db; }

    /* Campo: Subtítulo */
    #doc-subtitle {
      width: 100%;
      border: none;
      outline: none;
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 1.2rem;
      font-weight: 400;
      font-style: italic;
      color: #6b7280;
      line-height: 1.5;
      margin-bottom: 2rem;
      background: transparent;
      resize: none;
      overflow: hidden;
    }
    #doc-subtitle::placeholder { color: #e5e7eb; }

    /* Linha separadora */
    .paper-divider {
      border: none;
      border-top: 2px solid #111827;
      margin: 0 0 2rem;
    }

    /* Meta do documento (data e autor) */
    .doc-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid #e5e7eb;
    }
    .doc-meta-left { display: flex; flex-direction: column; gap: 2px; }
    .doc-meta span { font-size: 0.82rem; color: #9ca3af; }
    .doc-meta strong { font-size: 0.82rem; color: #6b7280; font-weight: 600; }

    /* Campo: Corpo */
    #doc-body {
      width: 100%;
      border: none;
      outline: none;
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 1.05rem;
      font-weight: 400;
      color: #1f2937;
      line-height: 1.95;
      background: transparent;
      resize: none;
      overflow: hidden;
      min-height: 480px;
    }
    #doc-body::placeholder { color: #d1d5db; font-style: italic; }

    /* Rodapé do papel */
    .paper-footer {
      margin-top: 3rem;
      padding-top: 1rem;
      border-top: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .paper-footer span {
      font-size: 0.78rem;
      color: #9ca3af;
    }

    /* ================================
       TOAST
    ================================ */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #111827;
      color: #fff;
      padding: 0.75rem 1.5rem;
      border-radius: 50px;
      font-size: 0.88rem;
      font-weight: 500;
      z-index: 9999;
      opacity: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.35s ease;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .toast-icon { font-size: 1rem; }

    /* ================================
       RESPONSIVO
    ================================ */
    @media (max-width: 680px) {
      .paper { padding: 40px 28px; }
      #doc-title { font-size: 1.7rem; }
      #doc-subtitle { font-size: 1rem; }
      #doc-filename { display: none; }
      .editor-header { padding: 0 1rem; }
      .status-pill { display: none; }
      .btn-header { padding: 7px 12px; font-size: 0.8rem; }
    }

  </style>
</head>
<body>

  <!-- CABEÇALHO DO EDITOR -->
  <header class="editor-header">

    <!-- Logo -->
    <a href="index.html" class="logo">minha<span>marca</span></a>

    <!-- Nome do arquivo (editável) -->
    <div class="doc-name-wrap">
      <input
        type="text"
        id="doc-filename"
        value="Documento sem título"
        title="Clique para renomear"
        spellcheck="false"
      />
    </div>

    <!-- Ações -->
    <div class="header-actions">
      <div class="status-pill">
        <span class="status-dot" id="status-dot"></span>
        <span id="status-text">Salvo</span>
      </div>
      <button class="btn-header btn-export" onclick="exportarDoc()">
        ↓ Exportar
      </button>
      <button class="btn-header btn-save-doc" onclick="salvarDoc()">
        ✦ Salvar
      </button>
    </div>

  </header>

  <!-- ÁREA DO DOCUMENTO -->
  <main class="editor-page">
    <div class="paper">

      <!-- Título -->
      <textarea
        id="doc-title"
        rows="1"
        placeholder="Título do documento"
        spellcheck="true"
        oninput="autoResize(this); aoEditar()"
      ></textarea>

      <!-- Subtítulo -->
      <textarea
        id="doc-subtitle"
        rows="1"
        placeholder="Subtítulo ou descrição breve..."
        spellcheck="true"
        oninput="autoResize(this); aoEditar()"
      ></textarea>

      <!-- Linha decorativa -->
      <hr class="paper-divider">

      <!-- Meta -->
      <div class="doc-meta">
        <div class="doc-meta-left">
          <strong id="meta-filename">Documento sem título</strong>
          <span id="meta-date"></span>
        </div>
        <span id="meta-words">0 palavras</span>
      </div>

      <!-- Corpo do texto -->
      <textarea
        id="doc-body"
        rows="20"
        placeholder="Escreva o conteúdo aqui. Este espaço é todo seu..."
        spellcheck="true"
        oninput="autoResize(this); aoEditar()"
      ></textarea>

      <!-- Rodapé do papel -->
      <div class="paper-footer">
        <span id="count-chars">0 caracteres</span>
        <span id="count-time">Leitura: ~0 min</span>
      </div>

    </div>
  </main>

  <!-- TOAST -->
  <div class="toast" id="toast">
    <span class="toast-icon" id="toast-icon">✓</span>
    <span id="toast-msg">Salvo com sucesso!</span>
  </div>

  <!-- JS COMPARTILHADO (hamburguer, scroll, etc.) -->
  <script src="main.js"></script>

  <!-- JS DO EDITOR -->
  <script>

    /* ---------- ELEMENTOS ---------- */
    const elTitle     = document.getElementById('doc-title');
    const elSubtitle  = document.getElementById('doc-subtitle');
    const elBody      = document.getElementById('doc-body');
    const elFilename  = document.getElementById('doc-filename');
    const elStatusDot = document.getElementById('status-dot');
    const elStatusTxt = document.getElementById('status-text');
    const elMetaFile  = document.getElementById('meta-filename');
    const elMetaDate  = document.getElementById('meta-date');
    const elMetaWords = document.getElementById('meta-words');
    const elChars     = document.getElementById('count-chars');
    const elTime      = document.getElementById('count-time');

    let timerSalvar;

    /* ---------- DATA ---------- */
    function formatarData() {
      return new Date().toLocaleDateString('pt-BR', {
        day: '2-digit', month: 'long', year: 'numeric'
      });
    }
    elMetaDate.textContent = formatarData();

    /* ---------- AUTO-RESIZE TEXTAREA ---------- */
    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = el.scrollHeight + 'px';
    }

    /* ---------- AO EDITAR ---------- */
    function aoEditar() {
      /* Status */
      elStatusDot.classList.add('editing');
      elStatusTxt.textContent = 'Editando…';

      /* Contadores */
      const texto = elBody.value;
      const palavras = texto.trim() === '' ? 0 : texto.trim().split(/\s+/).length;
      const chars    = texto.length;
      const minutos  = Math.max(1, Math.round(palavras / 200));

      elMetaWords.textContent = palavras + ' ' + (palavras === 1 ? 'palavra' : 'palavras');
      elChars.textContent     = chars + ' caracteres';
      elTime.textContent      = 'Leitura: ~' + minutos + ' min';

      /* Sincroniza nome */
      elMetaFile.textContent = elFilename.value || 'Documento sem título';

      /* Auto-salvar após 1.8s sem digitar */
      clearTimeout(timerSalvar);
      timerSalvar = setTimeout(() => {
        marcarSalvo();
      }, 1800);
    }

    /* ---------- NOME DO ARQUIVO ---------- */
    elFilename.addEventListener('input', () => {
      elMetaFile.textContent = elFilename.value || 'Documento sem título';
      document.title = (elFilename.value || 'Documento') + ' — MinhaMarca';
    });

    /* ---------- MARCAR SALVO ---------- */
    function marcarSalvo() {
      elStatusDot.classList.remove('editing');
      elStatusTxt.textContent = 'Salvo';
    }

    /* ---------- SALVAR ---------- */
    function salvarDoc() {
      marcarSalvo();
      mostrarToast('✓', 'Documento salvo com sucesso!');
    }

    /* ---------- EXPORTAR .TXT ---------- */
    function exportarDoc() {
      const titulo    = elTitle.value || 'Sem título';
      const subtitulo = elSubtitle.value;
      const corpo     = elBody.value;
      const sep       = '═'.repeat(48);

      const conteudo = [
        titulo.toUpperCase(),
        subtitulo,
        sep,
        '',
        corpo,
        '',
        sep,
        'Exportado em ' + new Date().toLocaleString('pt-BR')
      ].filter(l => l !== undefined).join('\n');

      const blob = new Blob([conteudo], { type: 'text/plain;charset=utf-8' });
      const a    = document.createElement('a');
      a.href     = URL.createObjectURL(blob);
      a.download = (elFilename.value || 'documento').replace(/[^a-zA-Z0-9À-úÀ-ÿ _-]/g, '') + '.txt';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);

      mostrarToast('↓', 'Arquivo exportado!');
    }

    /* ---------- TOAST ---------- */
    function mostrarToast(icone, msg) {
      const t = document.getElementById('toast');
      document.getElementById('toast-icon').textContent = icone;
      document.getElementById('toast-msg').textContent  = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    /* ---------- INICIALIZAR TAMANHOS ---------- */
    [elTitle, elSubtitle, elBody].forEach(el => autoResize(el));

  </script>

</body>
</html>
