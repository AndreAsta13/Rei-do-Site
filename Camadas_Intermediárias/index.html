 <!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Acesso</title>
  <link href="../CSS/Camadas.css" rel="stylesheet"/>

</head>
<body>
  

  <div class="page">
    <div class="logo">
      <div class="logo-dot"></div>
      Nexus
    </div>

    <div class="cards-wrapper">

      <!-- LOGIN -->
      <div class="panel panel-login">
        <span class="panel-tag"><span class="panel-tag-dot"></span>Bem-vindo de volta</span>
        <h2 class="panel-title">Entrar na<br>sua conta</h2>

        <form id="formLogin" novalidate onsubmit="handleLogin(event)">
          <div class="form-group">
            <label for="login-email">E-mail</label>
            <input type="email" id="login-email" placeholder="seu@email.com" autocomplete="email"/>
          </div>
          <div class="form-group">
            <label for="login-senha">Senha</label>
            <div class="input-wrapper">
              <input type="password" id="login-senha" placeholder="••••••••" autocomplete="current-password"/>
              <button type="button" class="toggle-pw" onclick="togglePw('login-senha',this)" aria-label="Mostrar senha">
                <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
          <a href="#" class="forgot">Esqueceu a senha?</a>
          <button type="submit" class="btn btn-login">Entrar</button>
          <div class="divider-line">ou continue com</div>
          <div class="social-row">
            <button type="button" class="btn-social">
              <svg width="15" height="15" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
              Google
            </button>
            <button type="button" class="btn-social">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 21.795 24 17.295 24 12c0-6.63-5.37-12-12-12"/></svg>
              GitHub
            </button>
          </div>
        </form>
        <div class="success-msg" id="login-success">✓ Login realizado com sucesso!</div>
      </div>

      <!-- CADASTRO -->
      <div class="panel panel-register">
        <span class="panel-tag"><span class="panel-tag-dot"></span>Primeira vez aqui?</span>
        <h2 class="panel-title">Criar sua<br>conta grátis</h2>

        <form id="formRegister" novalidate onsubmit="handleRegister(event)">
          <div class="form-group">
            <label for="reg-nome">Nome completo</label>
            <input type="text" id="reg-nome" placeholder="João Silva" autocomplete="name"/>
          </div>
          <div class="form-group">
            <label for="reg-email">E-mail</label>
            <input type="email" id="reg-email" placeholder="seu@email.com" autocomplete="email"/>
          </div>
          <div class="form-group">
            <label for="reg-senha">Senha</label>
            <div class="input-wrapper">
              <input type="password" id="reg-senha" placeholder="Mín. 8 caracteres" autocomplete="new-password" oninput="checkStrength(this.value)"/>
              <button type="button" class="toggle-pw" onclick="togglePw('reg-senha',this)" aria-label="Mostrar senha">
                <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <div class="strength-wrap" id="strength-wrap">
              <div class="strength-bars">
                <div class="strength-bar" id="sb1"></div>
                <div class="strength-bar" id="sb2"></div>
                <div class="strength-bar" id="sb3"></div>
                <div class="strength-bar" id="sb4"></div>
              </div>
              <span class="strength-label" id="strength-label"></span>
            </div>
          </div>
          <div class="form-group">
            <label for="reg-confirm">Confirmar senha</label>
            <div class="input-wrapper">
              <input type="password" id="reg-confirm" placeholder="Repita a senha" autocomplete="new-password"/>
              <button type="button" class="toggle-pw" onclick="togglePw('reg-confirm',this)" aria-label="Mostrar senha">
                <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
          <button type="submit" class="btn btn-register">Criar conta</button>
        </form>

        <p class="terms">Ao criar uma conta, você concorda com nossos <a href="#">Termos de Uso</a> e <a href="#">Política de Privacidade</a>.</p>
        <div class="success-msg" id="register-success" style="background:rgba(232,136,60,0.08);border-color:rgba(232,136,60,0.2);color:var(--accent2)">✓ Conta criada! Bem-vindo ao Nexus.</div>
      </div>

    </div>
  </div>

  <script>
    function togglePw(id, btn) {
      const input = document.getElementById(id);
      const isText = input.type === 'text';
      input.type = isText ? 'password' : 'text';
      btn.innerHTML = isText
        ? `<svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`
        : `<svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;
    }

    function checkStrength(val) {
      const wrap = document.getElementById('strength-wrap');
      wrap.classList.toggle('show', val.length > 0);
      let score = 0;
      if (val.length >= 8) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;
      const colors = ['#e05050','#e07a20','#e8c430','#4caf70'];
      const labels = ['Muito fraca','Fraca','Boa','Forte'];
      for (let i = 1; i <= 4; i++) {
        document.getElementById('sb'+i).style.background = i <= score ? colors[score-1] : 'var(--divider)';
      }
      const lbl = document.getElementById('strength-label');
      lbl.textContent = score > 0 ? labels[score-1] : '';
      lbl.style.color = score > 0 ? colors[score-1] : 'var(--muted)';
    }

    function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('login-email').value.trim();
      const senha = document.getElementById('login-senha').value;
      if (!email || !senha) { shake('formLogin'); return; }
      const msg = document.getElementById('login-success');
      msg.classList.add('show');
      setTimeout(() => msg.classList.remove('show'), 3000);
    }

    function handleRegister(e) {
      e.preventDefault();
      const nome = document.getElementById('reg-nome').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const senha = document.getElementById('reg-senha').value;
      const confirm = document.getElementById('reg-confirm').value;
      if (!nome || !email || !senha || senha !== confirm) { shake('formRegister'); return; }
      const msg = document.getElementById('register-success');
      msg.classList.add('show');
      setTimeout(() => msg.classList.remove('show'), 3000);
    }

    function shake(id) {
      const el = document.getElementById(id);
      el.style.animation = 'none';
      el.offsetHeight;
      el.style.animation = 'shake 0.4s ease';
    }
  </script>
</body>
</html>
